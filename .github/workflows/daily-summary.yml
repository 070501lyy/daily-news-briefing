name: Daily News Briefing

on:
  schedule:
    - cron: "0 1 * * *"  # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore dedup state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: news-summary-state-${{ github.run_id }}
          restore-keys: news-summary-state

      - name: Create sources.yaml
        env:
          SOURCES_YAML: ${{ secrets.SOURCES_YAML }}
        run: echo "$SOURCES_YAML" | tr -d '\n' | base64 -d > sources.yaml

      - name: Run summary
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LLM_MODEL: "deepseek-chat"
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          OUTPUT_MODE: markdown
          NEWS_SUMMARY_STATE: ./state.json
        run: python -m src.runner

      - name: Commit summaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add -f summaries/
          git diff --cached --quiet || git commit -m "chore: daily summary $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

